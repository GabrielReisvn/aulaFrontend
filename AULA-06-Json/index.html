<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>🐶 Dog Explorer</title>
</head>
<body>
    <div class="container">
        <h1>🐕 Explorador de cachorros</h1>
        <p class="subtitle">Consumindo a Dog CEO API</p>

        <!-- Área do cachorro -->
    <div class="dog-area">
        <img src="" alt="Cachorro" id="dogImage">
        <div id="breedName"></div>
    </div>

        <!-- Botão aleatório -->
    <div class="controls">
        <button id="randomBtn">🎲 Cachorro Aleatório</button>
    </div>

        <!-- Busca -->
    <div class="search">
        <input
            type="text"
            id="breedInput"
            placeholder="Digite uma raça (ex: husky, pug)"
        >
        <button id="searchBtn">🔍 Buscar</button>
    </div>

    </div>
    
    
</body>
</html>
